parameters:
- name: stageName
  type: string
- name: displayName
  type: string
- name: dependsOn
  type: string
  default: ''
- name: condition
  type: string
  default: ''
- name: jobName
  type: string
- name: jobDisplayName
  type: string
- name: cucumberTag
  type: string
- name: artifactName
  type: string

stages:
- stage: ${{ parameters.stageName }}
  displayName: ${{ parameters.displayName }}
  ${{ if ne(parameters.dependsOn, '') }}:
    dependsOn: ${{ parameters.dependsOn }}
  ${{ if ne(parameters.condition, '') }}:
    condition: ${{ parameters.condition }}
  jobs:
  - job: ${{ parameters.jobName }}
    displayName: ${{ parameters.jobDisplayName }}
    steps:
    - task: UseNode@1
      displayName: Use Node.js 20.x
      inputs:
        versionSpec: '20.x'

    - script: corepack enable
      displayName: Enable Corepack

    - script: corepack prepare npm@11.7.0 --activate
      displayName: Use npm 11.7.0

    - script: npm ci --include=dev --no-audit --no-fund
      displayName: Install dependencies
      env:
        NODE_ENV: development

    - script: npx cucumber-js --tags "${{ parameters.cucumberTag }}"
      displayName: Run Cucumber scenarios

    - script: npm run report:generate
      displayName: Generate HTML report
      condition: succeededOrFailed()

    - bash: |
        if [ -d "tests/reports/html" ]; then
          echo "##vso[task.setvariable variable=htmlReportExists]true"
        else
          echo "##vso[task.setvariable variable=htmlReportExists]false"
        fi
      displayName: Check HTML report folder
      condition: succeededOrFailed()

    - task: PublishPipelineArtifact@1
      displayName: Publish HTML report
      condition: and(succeededOrFailed(), eq(variables['htmlReportExists'], 'true'))
      inputs:
        targetPath: tests/reports/html
        artifact: ${{ parameters.artifactName }}