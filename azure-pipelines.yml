trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  displayName: Use Node.js 20.x
  inputs:
    versionSpec: '20.x'

- script: npm ci --include=dev --no-audit --no-fund
  displayName: Install dependencies
  env:
    NODE_ENV: development

- script: npx playwright install --with-deps chromium
  displayName: Install Playwright browser

- script: npx cucumber-js --tags "@smoke"
  displayName: Run smoke scenarios
  env:
    JUNIT_REPORT_FILE: tests/reports/cucumber-junit-smoke.xml

- task: PublishTestResults@2
  displayName: Publish smoke test results
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: JUnit
    testResultsFiles: tests/reports/cucumber-junit-smoke.xml
    testRunTitle: Smoke Cucumber Tests
    mergeTestResults: true

- script: npm run report:generate
  displayName: Generate HTML report
  condition: succeededOrFailed()
  env:
    REPORT_SUITE_NAME: Smoke Suite
    REPORT_TAG: "@smoke"
    CI_PLATFORM: Azure DevOps

- task: PublishPipelineArtifact@1
  displayName: Publish HTML report
  condition: succeededOrFailed()
  inputs:
    targetPath: tests/reports/html
    artifact: smoke-cucumber-html-report